version: '3.9'

services:
  backend:
    build: ./backend
    container_name: docsai-backend
    env_file: ./backend/.env
    volumes:
      - chroma_data:/app/chroma_db    # persist vector DB across restarts
      - uploads:/app/uploads           # persist uploaded files
    ports:
      - "8000:8000"                    # direct API access (optional)
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: docsai-frontend
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  chroma_data:
  uploads:
